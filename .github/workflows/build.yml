name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install nuitka ordered-set rich zstandard

      - name: Build with Nuitka
        run: >
          python -m nuitka --onefile --standalone --assume-yes-for-downloads 
          --output-dir=dist --output-filename=nox.exe 
          --windows-icon-from-ico=nox/icon.ico 
          --include-package=nox --include-package=rich 
          --nofollow-import-to=numba 
          --include-data-files=nox/info.cfg=nox/info.cfg 
          --python-flag=-m nox

      - name: Prepare Release Folder
        shell: bash
        run: |
          mkdir -p release_win
          cp dist/nox.exe release_win/
          [ -d "documentation" ] && cp -r documentation release_win/
          [ -d "Libraries" ] && cp -r Libraries release_win/

      - name: Create Zip (Windows)
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: 'nox_windows.zip'
          directory: 'release_win'

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nox_windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install nuitka ordered-set rich zstandard
          sudo apt-get update
          sudo apt-get install -y patchelf libfuse2

      - name: Build with Nuitka
        run: >
          python -m nuitka --onefile --standalone --assume-yes-for-downloads 
          --output-dir=dist --output-filename=nox 
          --include-package=nox --include-package=rich 
          --nofollow-import-to=numba 
          --include-data-files=nox/info.cfg=nox/info.cfg 
          --python-flag=-m nox

      - name: Prepare Release Folder
        run: |
          mkdir -p release_linux
          cp dist/nox release_linux/
          [ -d "documentation" ] && cp -r documentation release_linux/
          [ -d "Libraries" ] && cp -r Libraries release_linux/

      - name: Create Zip (Linux)
        uses: thedoctor0/zip-release@main
        with:
          type: 'zip'
          filename: 'nox_linux.zip'
          directory: 'release_linux'

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: nox_linux.zip