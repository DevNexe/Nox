name: Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install nuitka ordered-set rich zstandard

      - name: Build with Nuitka
        run: >
          python -m nuitka --onefile --standalone --assume-yes-for-downloads 
          --output-dir=dist --output-filename=nox.exe 
          --windows-icon-from-ico=nox/icon.ico 
          --include-package=nox --include-package=rich 
          --nofollow-import-to=numba 
          --include-data-files=nox/info.cfg=nox/info.cfg 
          --python-flag=-m nox

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nox.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install nuitka ordered-set rich zstandard
          sudo apt-get update
          sudo apt-get install -y patchelf libfuse2

      - name: Build with Nuitka
        run: >
          python -m nuitka --onefile --standalone --assume-yes-for-downloads 
          --output-dir=dist --output-filename=nox 
          --include-package=nox --include-package=rich 
          --nofollow-import-to=numba 
          --include-data-files=nox/info.cfg=nox/info.cfg 
          --python-flag=-m nox

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/nox