<h1>Modules</h1>
<p>Use <code>connect</code> to import modules, and <code>from ... connect</code> for specific names.</p>
<div class="codeblock">
  <button class="copy">Copy</button>
  <pre><code>connect math
connect json as j
from string connect split</code></pre>
</div>
<h2>Libraries</h2>
<p>Install libraries into <code>Libraries/</code> with:</p>
<div class="codeblock">
  <button class="copy">Copy</button>
  <pre><code>py -m nox package install user/repo</code></pre>
</div>
