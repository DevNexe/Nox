<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>{{title}} - Nox Docs</title>
    <link rel="icon" href="/icon.png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("nox_theme");
          if (t === "light") {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-burger" id="topbar-burger" aria-label="Toggle sidebar" type="button">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <a class="topbar-brand" href="/">
          <img class="topbar-logo" src="/icon.png" alt="Nox Docs" />
        </a>
        <div class="topbar-sub">{{subtitle}}</div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <input id="docs-search-top" placeholder="Search in documentation..." aria-label="Search in documentation" />
          <div id="search-popup" class="search-popup" hidden></div>
        </div>
        <div class="lang-switch" id="lang-switch">
          <button class="lang-trigger" id="lang-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="lang-current" id="lang-current">EN</span>
          </button>
          <div class="lang-menu" id="lang-menu" role="listbox" aria-label="Language">
            <button class="lang-def-item lang-item" data-lang="en" role="option" type="button">EN</button>
            <button class="lang-item" data-lang="ru" role="option" type="button">RU</button>
          </div>
        </div>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="theme-icon theme-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="theme-icon theme-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <button class="sidebar-toggle sidebar-corner" id="sidebar-toggle" aria-label="Toggle sidebar">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
        <nav class="nav" id="sidebar-nav">
          {{nav}}
        </nav>
      </aside>
      <main class="content" id="page-content">
        <div class="hero" id="page-hero">
          <h1>{{title}}</h1>
          <p>{{tagline}}</p>
        </div>
        <div id="page-body">{{content}}</div>
        <div class="pager" id="page-pager">
          <a class="pager-btn" href="{{prev_href}}">{{prev_title}}</a>
          <span></span>
          <a class="pager-btn" href="{{next_href}}">{{next_title}}</a>
        </div>
      </main>
    </div>
    <script src="/wiki.js"></script>
  </body>
</html>
